<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Portal Finky</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body {
  height:100vh;
  overflow:hidden;
  background:#0f172a;
}

/* 🌌 Fondo animado */
.bg {
  position:fixed;
  width:100%;
  height:100%;
  background: radial-gradient(circle at 20% 30%, rgba(255,90,0,0.3), transparent 40%),
              radial-gradient(circle at 80% 70%, rgba(0,150,255,0.3), transparent 40%),
              #0f172a;
  animation: moveBg 10s infinite alternate ease-in-out;
  z-index:-1;
}

@keyframes moveBg {
  0% {transform:translate(0,0);}
  100% {transform:translate(-50px,-30px);}
}

/* 🧠 cursor glow */
.cursor {
  position:fixed;
  width:200px;
  height:200px;
  background: radial-gradient(circle, rgba(255,90,0,0.2), transparent 60%);
  pointer-events:none;
  transform:translate(-50%,-50%);
}

/* 🧊 card */
.card {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.95);
  backdrop-filter: blur(30px);
  background: rgba(255,255,255,0.05);
  padding:50px;
  border-radius:20px;
  width:380px;
  text-align:center;
  color:white;
  box-shadow:0 40px 120px rgba(0,0,0,0.6);
  animation: fadeIn 1s ease forwards;
}

@keyframes fadeIn {
  to {opacity:1; transform:translate(-50%,-50%) scale(1);}
}

input {
  width:100%;
  padding:14px;
  margin:10px 0;
  border:none;
  border-radius:8px;
  background: rgba(255,255,255,0.1);
  color:white;
}

button {
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background: linear-gradient(90deg,#ff5a00,#ff8c42);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  transform:scale(1.05);
  box-shadow:0 0 30px rgba(255,90,0,0.8);
}

/* dashboard */
.dashboard {
  display:none;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  color:white;
  animation:fadeIn 1s ease;
}

.link-btn {
  margin-top:30px;
  display:inline-block;
  padding:15px 30px;
  border-radius:12px;
  background: linear-gradient(90deg,#ff5a00,#ff8c42);
  text-decoration:none;
  color:white;
  font-weight:600;
  transition:0.3s;
}

.link-btn:hover {
  transform:translateY(-5px);
  box-shadow:0 0 40px rgba(255,90,0,0.8);
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="cursor" id="cursor"></div>

<div class="card" id="login">
  <h1>Comité de Avance</h1>
  <p style="opacity:0.7;margin-bottom:20px;">Finky</p>

  <input id="user" placeholder="Usuario">
  <input id="pass" type="password" placeholder="Contraseña">

  <button onclick="login()">Ingresar</button>
</div>

<div class="dashboard" id="dashboard">
  <h1>Resumen Ejecutivo</h1>
  <p style="opacity:0.7;">Proyecto de escalamiento estratégico</p>

  <a class="link-btn" href="https://sites.google.com/view/comitedeavance/resumen-ejecutivo" target="_blank">
    Acceder al informe
  </a>
</div>

<script>
/* cursor efecto */
document.addEventListener("mousemove", e=>{
  const cursor = document.getElementById("cursor");
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

/* login */
function login(){
  const u=document.getElementById("user").value;
  const p=document.getElementById("pass").value;

  if(u==="Finky" && p==="Consultandes2026"){
    document.getElementById("login").style.display="none";
    document.getElementById("dashboard").style.display="block";
  } else {
    alert("Credenciales incorrectas");
  }
}
</script>

</body>
</html>
